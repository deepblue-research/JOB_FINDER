services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jobmatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  enrichment:
    build:
      context: ./backend/enrichment
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/enrichment/.env
    volumes:
      - ./backend/enrichment:/app
      - ./backend/enrichment/outputs:/app/outputs

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ENRICHMENT_URL=http://localhost:8080
    depends_on:
      - backend
      - enrichment
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: