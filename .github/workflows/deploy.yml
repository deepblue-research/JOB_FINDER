# =============================================================
# CI/CD Pipeline — JobMatch
# Runs on every push to main. SSHs into the Azure VM, pulls
# latest code, rebuilds containers, runs migrations.
# =============================================================

name: Deploy JobMatch

on:
  push:
    branches: [deployment]
  # This adds a "Run workflow" button in GitHub UI
  workflow_dispatch:

# If a new push comes while deploying, cancel the old one
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────
  # Job 1: Quick checks before deploying
  # ──────────────────────────────────────
  check:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check backend Python files for syntax errors
        run: |
          cd backend
          python -m py_compile app/main.py
          python -m py_compile app/config.py
          python -m py_compile app/database.py
          echo "Backend syntax OK"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check frontend builds successfully
        run: |
          cd frontend
          npm ci
          npm run build
          echo "Frontend build OK"

  # ──────────────────────────────────────
  # Job 2: Deploy to the Azure VM via SSH
  # ──────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            set -e

            echo "=== Step 1: Pull latest code ==="
            cd ~/JOB_FINDER
            git fetch origin deployment
            git reset --hard origin/deployment

            echo "=== Step 2: Write .env file ==="
            cat > .env << 'EOF'
            DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/jobmatch
            REDIS_URL=redis://redis:6379/0
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            JSEARCH_API_KEY=${{ secrets.JSEARCH_API_KEY }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=jobmatch
            ALLOWED_ORIGINS=http://${{ secrets.VM_HOST }}
            VITE_API_URL=http://${{ secrets.VM_HOST }}
            SQL_ECHO=false
            EOF

            echo "=== Step 3: Rebuild and restart containers ==="
            docker compose down
            docker compose up -d --build

            echo "=== Step 4: Wait for backend to start ==="
            sleep 15

            echo "=== Step 5: Run database migrations ==="
            docker compose exec -T backend alembic upgrade head || echo "Migration warning (may already be up to date)"

            echo "=== Step 6: Health check ==="
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                break
              fi
              echo "Waiting... attempt $i/5"
              sleep 5
            done

            # Final check — fail the pipeline if backend is not up
            curl -sf http://localhost:8000/health > /dev/null 2>&1 || { echo "DEPLOY FAILED — backend not responding"; docker compose logs backend --tail=30; exit 1; }

            echo "=== Step 7: Clean up old images ==="
            docker image prune -f

            echo "=== Deployment complete! ==="
